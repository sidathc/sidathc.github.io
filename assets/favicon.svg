<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Contrail trails from lower-left -->
  <line x1="1" y1="28" x2="11" y2="20" stroke="#5a8fbf" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="31" x2="13" y2="24" stroke="#5a8fbf" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Top-down airplane silhouette, rotated 45deg to fly upper-right -->
  <g transform="rotate(45, 16, 16)">
    <!-- Fuselage -->
    <path d="M16,3 L18,21 L16,19 L14,21 Z" fill="#2c3e50"/>
    <!-- Main wings -->
    <path d="M16,10 L4,16 L16,14 L28,16 Z" fill="#2c3e50"/>
    <!-- Tail stabilizers -->
    <path d="M16,19 L11,24 L16,22 L21,24 Z" fill="#2c3e50"/>
  </g>
</svg>
